<!DOCTYPE html>
<html>
<head>
  <title>Prediction Result</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
      padding: 20px;
      background-color: #e6f7ff;
      color: #333;
    }
    .result-container {
      max-width: 800px;
      margin: 0 auto;
      background-color: white;
      border-radius: 10px;
      padding: 30px;
      box-shadow: 0 0 15px rgba(0,0,0,0.1);
      animation: fadeIn 0.5s ease-in-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    h2 {
      color: #0077be;
      margin-bottom: 20px;
    }
    h3 {
      color: #0077be;
      margin-top: 25px;
      margin-bottom: 15px;
    }
    .fish-icon {
      font-size: 40px;
      margin-bottom: 20px;
    }
    .fish-image {
      border-radius: 10px;
      border: 3px solid #0077be;
      margin: 15px 0;
      max-width: 100%;
      height: auto;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      transition: transform 0.3s;
    }
    .fish-image:hover {
      transform: scale(1.02);
    }
    .btn {
      display: inline-block;
      padding: 12px 25px;
      margin: 10px;
      background-color: #0077be;
      color: white;
      text-decoration: none;
      border-radius: 5px;
      transition: background-color 0.3s, transform 0.2s;
      font-weight: bold;
    }
    .btn:hover {
      background-color: #005a8e;
      transform: translateY(-2px);
    }
    .fish-info {
      background-color: #f0f8ff;
      padding: 20px;
      border-radius: 8px;
      margin: 20px 0;
      text-align: left;
      border-left: 4px solid #0077be;
    }
    .fish-info p {
      margin: 10px 0;
      line-height: 1.5;
    }
    .catch-details {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      margin: 20px 0;
    }
    .detail-box {
      background-color: #f0f8ff;
      border-radius: 8px;
      padding: 15px;
      margin: 10px;
      min-width: 120px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.05);
      transition: transform 0.2s;
    }
    .detail-box:hover {
      transform: translateY(-5px);
    }
    .detail-label {
      font-weight: bold;
      color: #0077be;
      margin-bottom: 5px;
    }
    .detail-value {
      font-size: 24px;
      color: #333;
    }
  </style>
</head>
<body>
  <div class="result-container">
    <div class="fish-icon">🐟</div>
    <h2>Predicted Fish Species: {{ species }}</h2>
    <img src="{{ url_for('static', filename=image_name) if image_name else image }}" width="300" class="fish-image"><br>
    
    <div class="catch-details">
      <div class="detail-box">
        <div class="detail-label">Quantity</div>
        <div class="detail-value">{{ quantity }}</div>
      </div>
      
      <div class="detail-box">
        <div class="detail-label">Weight</div>
        <div class="detail-value">{{ kilogram }} kg</div>
      </div>
      

    </div>
    
    <div class="fish-info">
      <h3>Species Information</h3>
      <p><strong>Scientific Name:</strong> <em>{{ scientific_name }}</em></p>
      <p><strong>Habitat:</strong> {{ habitat }}</p>
      <p><strong>Description:</strong> {{ description }}</p>
    </div>
    
    <div>
      <a href="/" class="btn">🏠 Go Home</a>
      <a href="/records" class="btn">🎣 View All Records</a>
    </div>
  </div>
</body>
</html>
